services:
  dockhand-gateway:
    image: nginx:1.27-alpine
    container_name: dockhand-gateway
    depends_on:
      - dockhand
    restart: unless-stopped
    ports:
      - "${DOCKHAND_GATEWAY_PORT:-8080}:80"
    volumes:
      - ./ops/nginx/dockhand.conf:/etc/nginx/conf.d/default.conf:ro
      - ./secrets/htpasswd:/etc/nginx/.htpasswd:ro
